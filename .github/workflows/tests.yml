name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Provider SDKs are lazy-imported inside synthesize(); tests mock all
      # network/provider calls, so pytest is the only dependency.
      - run: pip install pytest
      - run: pytest -q
