name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Tests mock all network/provider calls; the international backends
      # (elevenlabs/openai/google) import requests at load time, everything
      # else is lazy-imported. Verified against a clean venv.
      - run: pip install pytest requests
      - run: pytest -q
